version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: secplatform
      POSTGRES_USER: secadmin
      POSTGRES_PASSWORD: secpassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secadmin -d secplatform"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
